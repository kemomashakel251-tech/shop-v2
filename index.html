<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Place</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif;margin:0;padding:0}
body{background:#ffffff;color:#333;line-height:1.6}
header{position:sticky;top:0;z-index:1000;background:#0a2540;color:white;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
header .brand{display:flex;align-items:center;gap:12px}
header img{height:45px;width:45px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid #fff;transition:0.3s}
header img:hover{transform:scale(1.1)}
header h1{font-size:22px;font-weight:700}
.whatsapp-btn{background:#25D366;color:white;padding:10px 18px;border-radius:30px;text-decoration:none;font-weight:700;font-size:15px;transition:0.3s}
.whatsapp-btn:hover{background:#1da851}
.hidden{display:none}
.login-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a2540 0%,#1e4d8b 100%);padding:20px}
.login-box{background:white;padding:40px;border-radius:20px;width:100%;max-width:450px;box-shadow:0 15px 40px rgba(0,0,0,0.3)}
.login-box h2{text-align:center;margin-bottom:30px;color:#0a2540;font-size:26px}
.login-box input{width:100%;padding:16px;margin:12px 0;border:2px solid #ddd;border-radius:12px;font-size:17px;transition:0.3s}
.login-box input:focus{border-color:#1e4d8b;outline:none}
.login-box button{width:100%;padding:16px;background:#1e4d8b;color:white;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:10px;transition:0.3s}
.login-box button:hover{background:#153a66}
.login-box button:last-child{background:#6c757d;font-size:15px;margin-top:15px}
.container{max-width:1100px;margin:30px auto;padding:20px}
.product-page{background:white;padding:30px;border-radius:20px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.08)}
.product-page img{width:100%;max-width:450px;border-radius:20px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.product-page h2{font-size:32px;margin:20px 0;color:#0a2540}
.price{font-size:34px;color:#1e4d8b;font-weight:700;margin:15px 0}
.product-page button{width:100%;max-width:450px;padding:20px;background:#1e4d8b;color:white;border:none;border-radius:60px;font-size:22px;font-weight:700;margin-top:20px;cursor:pointer;transition:0.3s;box-shadow:0 5px 15px rgba(30,77,139,0.3)}
.product-page button:hover{background:#153a66;transform:translateY(-2px)}
form{max-width:550px;margin:25px auto 0}
form h3{text-align:center;margin-bottom:20px;color:#0a2540;font-size:24px}
form input{width:100%;padding:18px;margin:14px 0;border:2px solid #ddd;border-radius:14px;font-size:18px;transition:0.3s}
form input:focus{border-color:#1e4d8b;outline:none}
.total-box{margin-top:20px;padding:20px;background:#f8f9fa;border-radius:14px;font-size:20px;border:3px solid #1e4d8b;text-align:center}
.total-box small{display:block;margin-top:10px;color:#666;font-size:16px}
.order-card{background:#f9f9f9;padding:20px;margin:15px 0;border-radius:15px;border:2px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.order-card b{color:#0a2540;font-size:19px}
.order-card input{width:130px;padding:10px;margin:8px 5px;border-radius:8px;border:2px solid #ccc;font-size:17px}
@media(max-width:768px){
  header{padding:10px 15px}
  header h1{font-size:18px}
  header img{height:38px;width:38px}
  .product-page{padding:20px}
  .product-page h2{font-size:26px}
  .price{font-size:28px}
  .product-page button{font-size:19px;padding:17px}
  form input{font-size:17px;padding:16px}
  .login-box{padding:30px 25px}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>🔐 دخول لوحة التحكم</h2>
    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username">
    <input type="password" id="password" placeholder="كلمة السر" autocomplete="current-password">
    <button onclick="login()">دخول</button>
    <button onclick="forgotPassword()">هل نسيت كلمة السر؟</button>
    <p style="margin-top:20px;font-size:13px;color:#999;text-align:center">للتجربة: kareem / kemomashakel251</p>
  </div>
</div>

<div id="app" class="hidden">
<header>
  <div class="brand">
    <img id="storeLogo" src="https://via.placeholder.com/45/1e4d8b/ffffff?text=YP" onclick="changeLogo()" title="اضغط لتغيير اللوجو">
    <h1>Your Place</h1>
  </div>
  <a href="https://wa.me/2010" target="_blank" class="whatsapp-btn">تواصل معنا</a>
</header>

<div class="container" id="customerView">
  <div class="product-page">
    <img id="prodImage" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600">
    <h2 id="prodName">سماعة لاسلكية</h2>
    <p class="price"><span id="prodPrice">350</span> جنيه</p>
    <button onclick="showForm()">اطلب الآن</button>
    
    <div id="orderForm" class="hidden">
      <form onsubmit="submitOrder(event)">
        <input type="text" placeholder="الاسم الكامل" id="cName" required>
        <input type="tel" placeholder="رقم الموبايل" id="cPhone" required pattern="[0-9]{11}">
        <input type="text" placeholder="العنوان بالتفصيل" id="cAddress" required>
        <input type="number" placeholder="الكمية" id="cQty" value="1" min="1" required oninput="calcTotal()">
        <div class="total-box">
          الإجمالي: <span id="total">350</span> جنيه
          <small>يضاف مصاريف الشحن حسب العنوان</small>
        </div>
        <button type="submit">تأكيد الطلب</button>
      </form>
    </div>
  </div>
</div>

<div class="container hidden" id="adminView">
  <button onclick="logout()" style="background:#dc3545;color:white;padding:12px 20px;border:none;border-radius:10px;margin-bottom:25px;font-weight:700;cursor:pointer;font-size:16px">خروج</button>
  <h2 style="margin-bottom:25px;color:#0a2540;font-size:28px">لوحة التحكم - الطلبات الواردة</h2>
  <div id="ordersList"></div>
</div>

</div>

<script>
const USER = "kareem";
const PASS = "kemomashakel251";
let orders = JSON.parse(localStorage.getItem('orders_v2')) || [];

function login(){
  let u = document.getElementById('username').value.trim();
  let p = document.getElementById('password').value.trim();
  if(u===USER && p===PASS){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('customerView').classList.add('hidden');
    showOrders();
  } else {
    alert("اسم المستخدم أو كلمة السر غير صحيحة ❌");
  }
}

function logout(){
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('customerView').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('username').value = "";
  document.getElementById('password').value = "";
}

function forgotPassword(){
  alert("لاسترجاع كلمة السر تواصل مع الدعم عبر واتساب\nملاحظة: استرجاع جوجل يحتاج سيرفر مدفوع");
}

function showForm(){
  document.getElementById('orderForm').classList.remove('hidden');
  calcTotal();
}

function calcTotal(){
  let price = parseInt(document.getElementById('prodPrice').innerText) || 0;
  let qty = parseInt(document.getElementById('cQty').value) || 1;
  document.getElementById('total').innerText = price * qty;
}

function submitOrder(e){
  e.preventDefault();
  let order = {
    id: Date.now(),
    name: document.getElementById('cName').value,
    phone: document.getElementById('cPhone').value,
    address: document.getElementById('cAddress').value,
    qty: parseInt(document.getElementById('cQty').value),
    product: document.getElementById('prodName').innerText,
    price: parseInt(document.getElementById('prodPrice').innerText),
    subtotal: parseInt(document.getElementById('prodPrice').innerText) * parseInt(document.getElementById('cQty').value),
    shipping: 0,
    date: new Date().toLocaleString('ar-EG')
  };
  orders.push(order);
  localStorage.setItem('orders_v2', JSON.stringify(orders));
  alert("تم استلام طلبك بنجاح ✅\nسنتواصل معك واتساب للتأكيد وتحديد مصاريف الشحن");
  e.target.reset();
  document.getElementById('orderForm').classList.add('hidden');
}

function showOrders(){
  let div = document.getElementById('ordersList');
  if(orders.length===0){
    div.innerHTML='<p style="text-align:center;color:#999;padding:40px;font-size:18px">لا يوجد طلبات حتى الآن</p>';
    return;
  }
  div.innerHTML = orders.reverse().map(o=>`
    <div class="order-card">
      <b>${o.name}</b> - ${o.phone}<br>
      <small style="color:#666">تاريخ الطلب: ${o.date}</small><br><br>
      المنتج: ${o.product} × ${o.qty}<br>
      العنوان: ${o.address}<br>
      السعر الفرعي: ${o.subtotal} جنيه<br>
      مصاريف الشحن: <input type="number" value="${o.shipping}" min="0" onchange="updateShipping(${o.id},this.value)"> جنيه<br><br>
      <b style="font-size:20px;color:#1e4d8b">الإجمالي النهائي: ${o.subtotal + parseInt(o.shipping||0)} جنيه</b>
    </div>
  `).join('');
}

function updateShipping(id,val){
  orders = orders.map(o=>o.id==id?{...o,shipping:parseInt(val)||0}:o);
  localStorage.setItem('orders_v2', JSON.stringify(orders));
  showOrders();
}

function changeLogo(){
  let url = prompt("الصق رابط الصورة الجديدة للوجو:");
  if(url && url.startsWith('http')) {
    document.getElementById('storeLogo').src = url;
    alert("تم تغيير اللوجو ✅");
  } else if(url) {
    alert("الرابط لازم يبدأ بـ http أو https");
  }
}
</script>
</body>
</html>
